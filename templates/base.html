<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{% block title %}Buxxel Marketplace{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-light bg-light px-3">
    <a class="navbar-brand" href="/">Buxxel</a>
  </nav>

  <main class="container py-4">
    {% block content %}
    {% endblock %}
  </main>

  <footer class="text-center text-muted py-3">
    <small>&copy; {{ current_year }} Buxxel — Empowering creators</small>
  </footer>

  <script>
    const year = new Date().getFullYear();
    document.querySelectorAll("{{ current_year }}").forEach(el => el.textContent = year);
  </script>
</body>
</html>
