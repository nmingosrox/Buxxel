<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Buxxel Marketplace{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/buxxel.css') }}">

<style>
  .hero {
    background-image: url("https://ik.imagekit.io/mon8rxoqi/andy-hermawan-uFdCDgnoNVI-unsplash.jpg?updatedAt=1752761309892");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    color: black;
    padding: 4rem 2rem; /* ↓ reduced from 6rem */
    border-radius: 0.5rem;
    box-shadow: 0 0 20px rgba(0,0,0,0.3);
  }

  .hero h1 {
    font-size: 3rem;
    font-weight: 700;
  }

  .hero p {
    color: black;
    font-size: 1.25rem;
    margin-top: 0rem;
  }

  @media (max-width: 768px) {
    .hero {
      padding: 2.5rem 1rem;
    }

    .hero h1 {
      font-size: 2rem;
    }

    .hero p {
      font-size: 1rem;
    }
  }
</style>
</head>
<body class="bg-dark text-light" >
  <main class="container py-4">
    {% block content %}
    {% endblock %}
  </main>

  <footer class="text-center text-muted py-3">
    <small>&copy; {{ current_year }} Buxxel — Empowering creators</small>
  </footer>

  <script>
    const year = new Date().getFullYear();
    document.querySelectorAll("{{ current_year }}").forEach(el => el.textContent = year);
  </script>
</body>
</html>
