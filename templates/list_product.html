<!DOCTYPE html>
<html>
<head>
  <title>List a Product</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
  <h2>List Your Creation</h2>
  <form method="POST">
    <div class="mb-3">
      <input type="text" name="name" placeholder="Product Name" class="form-control" required>
    </div>
    <div class="mb-3">
      <textarea name="description" placeholder="Product Description" class="form-control" rows="4"></textarea>
    </div>
    <div class="mb-3">
      <input type="number" step="0.01" name="price" placeholder="Price (USD)" class="form-control" required>
    </div>
    <button type="submit" class="btn btn-warning">List Product</button>
  </form>
</body>
</html>
